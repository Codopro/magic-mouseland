<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>マイクラれんしゅうひろば</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f8fc;
      --ink: #1e293b;
      --muted: #64748b;
      --blue: #3b82f6;
      --blue-hover: #2563eb;
      --blue-light: #eff6ff;
      --shadow: 0 20px 40px rgba(30, 41, 59, 0.05);
      --card-shadow: 0 10px 30px rgba(59, 130, 246, 0.06);
      --card-shadow-hover: 0 20px 45px rgba(59, 130, 246, 0.15);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Outfit', 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 960px;
      text-align: center;
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      margin-bottom: 45px;
    }

    .logo-img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 10px 15px rgba(30, 58, 138, 0.15));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .title {
      font-size: 2.6rem;
      font-weight: 900;
      color: #1e3a8a;
      letter-spacing: -0.02em;
      margin-top: 20px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 8px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 35px;
      margin-top: 10px;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 32px;
      padding: 40px 30px;
      min-height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--card-shadow);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 32px;
      padding: 2px;
      background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--card-shadow-hover);
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(59, 130, 246, 0.25);
    }

    .card:active {
      transform: translateY(-2px);
    }

    .card-icon {
      width: 90px;
      height: 90px;
      border-radius: 24px;
      background: var(--blue-light);
      display: grid;
      place-items: center;
      margin-bottom: 24px;
      color: var(--blue);
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.08);
    }

    .card:hover .card-icon {
      background: var(--blue);
      color: #fff;
      transform: scale(1.05) rotate(3deg);
      box-shadow: 0 12px 25px rgba(59, 130, 246, 0.2);
    }

    .card-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
    }

    .card-desc {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      font-weight: 600;
      max-width: 280px;
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
        gap: 25px;
      }
      .card {
        min-height: 240px;
        padding: 30px 20px;
      }
      .title {
        font-size: 2.1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img class="logo-img" src="image/mau_kun.png" alt="マウくん">
      <h1 class="title">マイクラれんしゅうひろば</h1>
      <p class="subtitle">あそびたい れんしゅうを えらんでね！</p>
    </div>

    <div class="cards-grid">
      <!-- カード1：マウス・ブロック -->
      <div class="card" onclick="location.href='mouse_practice.html'">
        <div class="card-icon">
          <svg width="60" height="60" viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="26" fill="none" stroke="currentColor" stroke-width="5"/>
            <path d="M36 28 L54 36 L46 42 L56 52 L50 56 L40 46 L34 52 Z" fill="#343a40" stroke="#fff" stroke-width="2"/>
          </svg>
        </div>
        <h3 class="card-title">マウス・ブロック</h3>
        <p class="card-desc">クリック、ダブルクリック、ドラッグ、ブロックを れんしゅうしよう！</p>
      </div>

      <!-- カード2：タイピング -->
      <div class="card" onclick="location.href='typing_practice.html'">
        <div class="card-icon">
          <svg width="60" height="60" viewBox="0 0 64 64">
            <rect x="6" y="14" width="52" height="36" rx="6" fill="none" stroke="currentColor" stroke-width="4"/>
            <rect x="12" y="20" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="20" y="20" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="28" y="20" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="36" y="20" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="44" y="20" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="12" y="28" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="20" y="28" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="28" y="28" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="36" y="28" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="44" y="28" width="6" height="6" rx="1" fill="currentColor"/>
            <rect x="18" y="38" width="28" height="6" rx="1" fill="currentColor"/>
          </svg>
        </div>
        <h3 class="card-title">キーボード</h3>
        <p class="card-desc">キーボードで ローマ字や ことばの タイピングを れんしゅうしよう！</p>
      </div>
    </div>
  </div>
</body>
</html>
